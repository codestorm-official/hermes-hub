services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    image: hermes:local
    container_name: hermes
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Hermes}
      APP_URL: ${APP_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      PORT: 3000
      TRUST_PROXY: ${TRUST_PROXY:-true}
    ports:
      - "${HOST_PORT:-3000}:3000"
